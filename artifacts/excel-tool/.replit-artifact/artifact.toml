kind = "web"
previewPath = "/"
title = "Excel Merge & Edit Tool"
version = "1.0.0"
id = "artifacts/excel-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18821

[services.development]
run = "pnpm --filter @workspace/excel-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/excel-tool", "run", "build" ]
publicDir = "artifacts/excel-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18821"
BASE_PATH = "/"
