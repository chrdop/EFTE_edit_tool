openapi: "3.1.0"
info:
  title: Api
  version: "1.0.0"
servers:
  - url: /api

paths:
  /auth/login:
    post:
      operationId: login
      summary: Verify the app password and receive an auth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Wrong password
        "503":
          description: APP_PASSWORD not configured

  /healthz:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    post:
      operationId: createSession
      summary: Create a new processing session
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      summary: Get session state
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found

    patch:
      operationId: updateSession
      summary: Update session configuration (month, delete rows, modify rows)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found

  /sessions/{sessionId}/upload:
    post:
      operationId: uploadFiles
      summary: Upload Excel files to the session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/FileUploadInput"
      responses:
        "200":
          description: Files uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request
        "404":
          description: Not found

  /sessions/{sessionId}/read-values:
    post:
      operationId: readCurrentValues
      summary: Read current Hours and EFTE values for specific rows from a location's sheet
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadValuesInput"
      responses:
        "200":
          description: Current values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadValuesResult"
        "400":
          description: Bad request
        "404":
          description: Not found

  /sessions/{sessionId}/preview:
    post:
      operationId: previewChanges
      summary: Preview delete and modify changes before applying
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewResult"
        "400":
          description: Bad request
        "404":
          description: Not found

  /sessions/{sessionId}/export:
    post:
      operationId: exportSession
      summary: Apply all changes and prepare the Excel file for download
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"
        "400":
          description: Bad request
        "404":
          description: Not found

  /sessions/{sessionId}/send-email:
    post:
      operationId: sendEmail
      summary: Send master Excel and PDF report via email
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailResult"
        "400":
          description: Bad request
        "404":
          description: Not found

  /sessions/{sessionId}/download:
    get:
      operationId: downloadSession
      summary: Download the processed master Excel file
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    FileUploadInput:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: string

    UploadedFile:
      type: object
      required: [id, originalName, sheetNames, detectedMonths, locationName]
      properties:
        id:
          type: string
        originalName:
          type: string
        locationName:
          type: string
        sheetNames:
          type: array
          items:
            type: string
        detectedMonths:
          type: array
          items:
            type: string

    DeleteRowConfig:
      type: object
      required: [rowNumber]
      properties:
        rowNumber:
          type: integer

    ModifyRowConfig:
      type: object
      required: [rowNumber, hoursAdjustment, efteAdjustment, divisor, plusMinus, locationName]
      properties:
        locationName:
          type: string
        rowNumber:
          type: integer
        plusMinus:
          type: string
          enum: ["+", "-"]
        hoursAdjustment:
          type: number
        efteAdjustment:
          type: number
        divisor:
          type: number
        remarks:
          type: string

    Session:
      type: object
      required: [id, files, selectedMonth, deleteRows, modifyRows, status]
      properties:
        id:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/UploadedFile"
        selectedMonth:
          type: ["string", "null"]
        deleteRows:
          type: array
          items:
            $ref: "#/components/schemas/DeleteRowConfig"
        modifyRows:
          type: array
          items:
            $ref: "#/components/schemas/ModifyRowConfig"
        status:
          type: string
          enum: [empty, uploaded, configured, exported]

    SessionUpdate:
      type: object
      properties:
        selectedMonth:
          type: ["string", "null"]
        deleteRows:
          type: array
          items:
            $ref: "#/components/schemas/DeleteRowConfig"
        modifyRows:
          type: array
          items:
            $ref: "#/components/schemas/ModifyRowConfig"

    PreviewDeleteRow:
      type: object
      required: [rowNumber, sheetName, locationName]
      properties:
        rowNumber:
          type: integer
        sheetName:
          type: string
        locationName:
          type: string
        currentHours:
          type: ["number", "null"]
        currentEfte:
          type: ["number", "null"]

    PreviewModifyRow:
      type: object
      required: [rowNumber, sheetName, locationName, newHours, newEfte]
      properties:
        rowNumber:
          type: integer
        sheetName:
          type: string
        locationName:
          type: string
        currentHours:
          type: ["number", "null"]
        currentEfte:
          type: ["number", "null"]
        newHours:
          type: ["number", "null"]
        newEfte:
          type: ["number", "null"]

    PreviewResult:
      type: object
      required: [deletePreview, modifyPreview]
      properties:
        deletePreview:
          type: array
          items:
            $ref: "#/components/schemas/PreviewDeleteRow"
        modifyPreview:
          type: array
          items:
            $ref: "#/components/schemas/PreviewModifyRow"

    ReadValuesItem:
      type: object
      required: [locationName, rowNumber]
      properties:
        locationName:
          type: string
        rowNumber:
          type: integer

    ReadValuesInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReadValuesItem"

    RowCurrentValue:
      type: object
      required: [rowNumber]
      properties:
        rowNumber:
          type: integer
        hours:
          type: ["number", "null"]
        efte:
          type: ["number", "null"]

    ReadValuesResult:
      type: object
      required: [values]
      properties:
        values:
          type: array
          items:
            $ref: "#/components/schemas/RowCurrentValue"

    ExportResult:
      type: object
      required: [downloadUrl, filename, pdfUrl, pdfFilename]
      properties:
        downloadUrl:
          type: string
        filename:
          type: string
        pdfUrl:
          type: string
        pdfFilename:
          type: string

    EmailRequest:
      type: object
      required: [recipientEmail]
      properties:
        recipientEmail:
          type: string

    EmailResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    LoginRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string

    LoginResult:
      type: object
      required: [token]
      properties:
        token:
          type: string
